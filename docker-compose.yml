version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: mysql_test
    deploy:
      resources:
        limits:
          memory: 512M
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: mydb
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    
  redis:
    image: redis:7-alpine
    container_name: redis_test
    ports:
      - "6379:6379"

volumes:
  db_data: